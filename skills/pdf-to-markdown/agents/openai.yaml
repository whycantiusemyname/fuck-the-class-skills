interface:
  display_name: "Pdf To Markdown"
  short_description: "MinerU-first PDF to Obsidian workflow with segmented LLM cleanup and completion certificate"
  default_prompt: "Use $pdf-to-markdown to convert this local PDF into one Obsidian Markdown note: preflight and split for MinerU, parse and fetch results, lightly normalize/merge, process every LLM readthrough segment, merge repaired segments into the requested final Markdown, then write completion.json and run verify_completion.py before reporting completion."
